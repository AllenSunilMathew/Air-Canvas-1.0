<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Draw</title>

<style>
:root{
  --bg:#f4f7ff;
  --panel:#ffffff;
  --accent:#6c8cff;
  --accent2:#8fd3f4;
}
*{box-sizing:border-box;}

/* Preloader Styles */
.preloader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #f4f7ff, #eef2ff);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 5s ease, visibility 3s ease;
}

.preloader.hidden {
  opacity: 0;
  visibility: hidden;
}

.preloader-content {
  text-align: center;
}

.spinner {
  width: 60px;
  height: 60px;
  border: 4px solid #eef2ff;
  border-top: 4px solid #6c8cff;
  border-right: 4px solid #8fd3f4;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  20% { transform: rotate(72deg); }
  40% { transform: rotate(144deg); }
  60% { transform: rotate(216deg); }
  80% { transform: rotate(288deg); }
  100% { transform: rotate(360deg); }
}


.preloader-text {
  font-size: 18px;
  font-weight: 600;
  background: linear-gradient(135deg, #6c8cff, #8fd3f4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

body{
  margin:0;height:100vh;
  font-family:"Segoe UI",sans-serif;
  background:linear-gradient(135deg,var(--bg),#eef2ff);
  display:flex;align-items:center;justify-content:center;
}

.app{display:flex;width:95%;height:90%;gap:20px;}

.left{
  flex:1;
  background:linear-gradient(135deg,#eaf0ff,#f9fbff);
  border-radius:24px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
}

.bubbles{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
  pointer-events:none;
}

.bubble{
  position:absolute;
  bottom:-50px;
  background:radial-gradient(circle, rgba(108,140,255,0.3) 0%, rgba(143,211,244,0.1) 70%);
  border-radius:50%;
  animation:float 6s infinite ease-in-out;
}

.bubble:nth-child(1){width:40px;height:40px;left:10%;animation-delay:0s;}
.bubble:nth-child(2){width:60px;height:60px;left:20%;animation-delay:2s;}
.bubble:nth-child(3){width:30px;height:30px;left:40%;animation-delay:4s;}
.bubble:nth-child(4){width:50px;height:50px;left:60%;animation-delay:1s;}
.bubble:nth-child(5){width:35px;height:35px;left:80%;animation-delay:3s;}

@keyframes float{
  0%{transform:translateY(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}

.title{
  font-size:36px;font-weight:800;
  background:linear-gradient(135deg,#6c8cff,#8fd3f4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
  z-index:1;
}

canvas{
  background:white;
  border-radius:24px;
  box-shadow:0 20px 50px rgba(0,0,0,.15);
  z-index:1;
}

.panel{
  width:380px;
  background:linear-gradient(135deg, #ffffff, #f0f4ff);
  border-radius:24px;
  box-shadow:0 20px 60px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,0.6);
  padding:20px;
  display:flex;flex-direction:column;gap:16px;
  border:1px solid rgba(108,140,255,0.1);
}

.section-title{
  font-weight:700;
  opacity:.7;
  color:#4a5568;
  text-transform:uppercase;
  letter-spacing:1px;
  font-size:12px;
}

.tools{display:flex;gap:10px;}

button,select{
  flex:1;padding:12px;border:none;
  border-radius:16px;background:#eef2ff;
  font-weight:600;cursor:pointer;
  transition:background 0.3s ease, transform 0.2s ease;
}

button:hover, select:hover{
  transform:scale(1.05);
}

button.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  box-shadow:0 4px 15px rgba(108,140,255,.3);
}

.colors{display:flex;gap:10px;align-items:center;}
.colors div{
  width:32px;height:32px;border-radius:50%;
  border:2px solid #ddd;cursor:pointer;
  transition:transform 0.2s ease;
}

.colors div:hover{
  transform:scale(1.1);
}

.color-picker{
  width:44px;height:32px;border:none;border-radius:6px;cursor:pointer;
}

.generate{
  margin-top:auto;padding:18px;
  font-size:16px;border-radius:24px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  box-shadow:0 10px 30px rgba(108,140,255,.5);
  transition:transform 0.2s ease;
}

.generate:hover{
  transform:scale(1.05);
}



</style>
</head>

<body>

<!-- Preloader -->
<div class="preloader" id="preloader">
  <div class="preloader-content">
    <div class="spinner"></div>
    <div class="preloader-text">Welcome To Air Drawing World</div>
      <p class="text-slate-400 text-sm md:text-base">
      Preparing your creative canvas...
    </p>

    <!-- Loading bar -->
    <div class="w-64 h-1 bg-slate-700 rounded-full overflow-hidden mx-auto">
      <div class="h-full bg-gradient-to-r from-blue-400 to-cyan-400 animate-loading"></div>
    </div>
    <div class="preloader-sub"></div>
  </div>
</div>

<div class="app">

<div class="left">
  <div class="bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>
  <div class="title">Draw</div>
  <canvas id="canvas" width="600" height="600"></canvas>
</div>

<div class="panel">
  <div class="section-title">Brush</div>
  <div class="tools">
    <button id="brushBtn" class="active">✏ Brush</button>
    <button id="eraserBtn">🧽 Eraser</button>
    <button onclick="clearCanvas()">🗑 Clear</button>
  </div>

  <div class="section-title">Size</div>
  <input type="range" id="size" min="1" max="30" value="6" style="width:100%;">

  <div class="section-title">Colors</div>
  <div class="colors">
    <div style="background:black" onclick="setColor('black')"></div>
    <div style="background:red" onclick="setColor('red')"></div>
    <div style="background:blue" onclick="setColor('blue')"></div>
    <div style="background:green" onclick="setColor('green')"></div>
    <input type="color" id="colorPicker" class="color-picker" value="#000000" onchange="setColor(this.value)">
  </div>

  <div class="section-title">Style</div>
  <select id="styleSelect" title="Select output style">
    <option value="outline">Outline</option>
    <option value="realistic" selected>Realistic</option>
    <option value="animated">Animated</option>
  </select>

<button class="generate" onclick="generate()">✨ Generate</button>
  <button onclick="window.location.href='air.html'">🖐 Air Canvas</button>

</div>
</div>

<script>
// Get preloader element
const preloader = document.getElementById('preloader');

// Hide preloader when page loads
window.addEventListener('load', function() {
  preloader.classList.add('hidden');
});

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
let drawing=false,lastX=0,lastY=0,mode="brush";

let sparkleTime = 0;
let sparkleEnabled = true;

ctx.lineCap="round";ctx.strokeStyle="#4fc3e7";
ctx.lineJoin = "round";

canvas.onpointerdown=e=>{
 drawing=true;
 const r=canvas.getBoundingClientRect();
 lastX=(e.clientX-r.left)*(canvas.width/r.width);
 lastY=(e.clientY-r.top)*(canvas.height/r.height);
};

canvas.onpointerup=()=>drawing=false;
function updateSparkleColor() {
  const time = sparkleTime;
  const hue = (200 + Math.sin(time) * 30 + 360) % 360;
  const s = 60 + Math.sin(time * 1.3) * 40;
  const l = 75 + Math.sin(time * 0.7) * 20;
  sparkleTime += 0.15;
  return `hsl(${Math.round(hue)}, ${Math.round(s)}%, ${Math.round(l)}%)`;
}

canvas.onpointermove=e=>{
 if(!drawing)return;
 const r=canvas.getBoundingClientRect();
 const x=(e.clientX-r.left)*(canvas.width/r.width);
 const y=(e.clientY-r.top)*(canvas.height/r.height);
 ctx.lineWidth=size.value;
 ctx.globalCompositeOperation=mode==="eraser"?"destination-out":"source-over";
 if (mode !== "eraser" && sparkleEnabled) {
   ctx.strokeStyle = updateSparkleColor();
 } 
 ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();
 lastX=x;lastY=y;
};

function setColor(c){ctx.strokeStyle=c;}
brushBtn.onclick=()=>{mode="brush";brushBtn.classList.add("active");eraserBtn.classList.remove("active");}
eraserBtn.onclick=()=>{mode="eraser";eraserBtn.classList.add("active");brushBtn.classList.remove("active");}

function clearCanvas(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 // Reset RESULT PAGE
 localStorage.removeItem("sketch");
 localStorage.setItem("status","idle");
}

async function generate(){
 const exportCanvas=document.createElement("canvas");
 exportCanvas.width=canvas.width;
 exportCanvas.height=canvas.height;
 const ectx=exportCanvas.getContext("2d");
 ectx.fillStyle="white";
 ectx.fillRect(0,0,exportCanvas.width,exportCanvas.height);
 ectx.drawImage(canvas,0,0);

 const blob=await new Promise(r=>exportCanvas.toBlob(r,"image/png"));
 const reader=new FileReader();

 reader.onloadend=()=>{
   localStorage.setItem("sketch",reader.result);
   localStorage.setItem("style",styleSelect.value);
   localStorage.setItem("status","idle"); // Reset first
   localStorage.setItem("status","generating"); // Then generate to always trigger
 };
 reader.readAsDataURL(blob);
}
</script>

</body>
</html>
