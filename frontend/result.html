<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Result</title>

<style>
body{
  margin:0;height:100vh;
  font-family:"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#f4f7ff,#eef2ff);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
}

.bubbles{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  z-index:0;
}

.bubble{
  position:absolute;
  bottom:-50px;
  background:radial-gradient(circle, rgba(108,140,255,0.3) 0%, rgba(143,211,244,0.1) 70%);
  border-radius:50%;
  animation:float 6s infinite ease-in-out;
}

.bubble:nth-child(1){width:40px;height:40px;left:10%;animation-delay:0s;}
.bubble:nth-child(2){width:60px;height:60px;left:20%;animation-delay:2s;}
.bubble:nth-child(3){width:30px;height:30px;left:40%;animation-delay:4s;}
.bubble:nth-child(4){width:50px;height:50px;left:60%;animation-delay:1s;}
.bubble:nth-child(5){width:35px;height:35px;left:80%;animation-delay:3s;}

@keyframes float{
  0%{transform:translateY(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}

.sparkles{
  position:absolute;
  top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  z-index:1;
}

.sparkle{
  position:absolute;
  width:4px;height:4px;
  background:#ffd700;
  border-radius:50%;
  animation:sparkleTwinkle 1.5s infinite ease-in-out;
}

.sparkle:nth-child(1){top:20%;left:15%;animation-delay:0s;}
.sparkle:nth-child(2){top:30%;left:70%;animation-delay:0.5s;}
.sparkle:nth-child(3){top:50%;left:25%;animation-delay:1s;}
.sparkle:nth-child(4){top:70%;left:80%;animation-delay:1.5s;}
.sparkle:nth-child(5){top:10%;left:50%;animation-delay:2s;}

@keyframes sparkleTwinkle{
  0%,100%{opacity:0;transform:scale(0);}
  50%{opacity:1;transform:scale(1);}
}

.card{
  width:520px;background:white;
  border-radius:24px;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
  padding:24px;text-align:center;
  animation: cardFadeIn 0.8s ease-out;
  position:relative;
  z-index:2;
}

@keyframes cardFadeIn {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

h2{
  background:linear-gradient(135deg,#6c8cff,#8fd3f4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: titleGlow 2s ease-in-out infinite alternate;
  position:relative;
}

@keyframes titleGlow {
  0% { filter: brightness(1); }
  100% { filter: brightness(1.2); }
}

#idle{
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

#loader{
  display:none;
  animation: loaderSlideIn 0.5s ease-out;
}

@keyframes loaderSlideIn {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}

.bar{
  height:14px;background:#eef2ff;
  border-radius:999px;overflow:hidden;
  position:relative;
}

.bar::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, transparent, rgba(108,140,255,0.2), transparent);
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.bar span{
  display:block;height:100%;width:0%;
  background:linear-gradient(135deg,#6c8cff,#8fd3f4);
  transition:.3s;
  position:relative;
  overflow:hidden;
}

.bar span::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: progressShine 2s infinite;
}

@keyframes progressShine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

#output{
  display:none;
  animation: imageFadeIn 0.8s ease-out;
}

@keyframes imageFadeIn {
  0% { opacity: 0; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}

img{
  max-width:100%;
  border-radius:16px;
  margin-top:20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
</style>
</head>

<body>
<div class="bubbles">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>
<div class="sparkles">
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
</div>
<div class="card">
<h2>Result</h2>

<div id="idle">Waiting for the drawer to finish… ✏️</div>

<div id="loader">
  <div>Generating… ✨</div>
  <div class="bar"><span id="progress"></span></div>
</div>

<img id="output">
</div>

<script>
const idle=document.getElementById("idle");
const loader=document.getElementById("loader");
const progress=document.getElementById("progress");
const output=document.getElementById("output");

let timer=null;

function reset(){
 idle.style.display="block";
 loader.style.display="none";
 output.style.display="none";
 progress.style.width="0%";
}

async function start(){
 idle.style.display="none";
 loader.style.display="block";
 output.style.display="none";

 let p=0;
 timer=setInterval(()=>{
   if(p<90){p+=Math.random()*6;progress.style.width=p+"%";}
 },400);

 const sketch=localStorage.getItem("sketch");
 const style=localStorage.getItem("style");

 const blob=await (await fetch(sketch)).blob();
 const form=new FormData();
 form.append("image",blob);
 form.append("style",style);

 const res=await fetch("http://localhost:8000/generate",{method:"POST",body:form});
 const data=await res.json();

 clearInterval(timer);
 progress.style.width="100%";
 loader.style.display="none";
 output.src="data:image/png;base64,"+data.image;
 output.style.display="block";
}

window.addEventListener("storage",e=>{
 if(e.key==="status"){
   if(e.newValue==="generating") start();
   if(e.newValue==="idle") reset();
 }
});

// Initial state
reset();
</script>

</body>
</html>
