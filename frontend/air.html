<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air Sketch</title>

<style>
:root{
  --bg:#f4f7ff;
  --accent:#6c8cff;
  --accent2:#8fd3f4;
}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:linear-gradient(135deg,var(--bg),#eef2ff);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.preloader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #f4f7ff, #eef2ff);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s ease, visibility 0.5s ease;
}

.preloader.hidden {
  opacity: 0;
  visibility: hidden;
}

.preloader-content {
  text-align: center;
}

.spinner {
  width: 60px;
  height: 60px;
  border: 4px solid #eef2ff;
  border-top: 4px solid #6c8cff;
  border-right: 4px solid #8fd3f4;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.preloader-text {
  font-size: 18px;
  font-weight: 600;
  background: linear-gradient(135deg, #6c8cff, #8fd3f4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.preloader-sub {
  font-size: 14px;
  color: #666;
  margin-top: 8px;
}

.title{
  font-size:32px;
  font-weight:800;
  background:linear-gradient(135deg,#6c8cff,#8fd3f4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
}

.workspace{
  position:relative;
  width:700px;
  height:500px;
  background:white;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
  display:flex;
  align-items:center;
  justify-content:center;
}

canvas{
  background:white;
  border-radius:20px;
}

.videoBox{
  position:absolute;
  width:180px;
  height:135px;
  top:20px;
  right:20px;
  border-radius:12px;
  overflow:hidden;
  border:2px solid #ddd;
  cursor:grab;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
  background:#000;
}

#videoCanvas{
  width:100%;
  height:100%;
  object-fit:cover;
}

video{
  display:none;
}

.controls{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

.buttons{
  display:flex;
  gap:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(108,140,255,.3);
}

button:hover{
  transform:scale(1.05);
}

.colors{
  display:flex;
  gap:10px;
  align-items:center;
}

.colors div{
  width:28px;
  height:28px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid #ddd;
}

.color-picker{
  width:40px;
  height:28px;
  border:none;
}

.style-select{
  display:flex;
  gap:10px;
  align-items:center;
}

.style-select select{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #ddd;
  background:white;
  font-weight:600;
  color:#333;
  cursor:pointer;
  outline:none;
}

.style-select select:focus{
  border-color:var(--accent);
}

.instructions{
  margin-top:15px;
  font-size:12px;
  color:#666;
  text-align:center;
  background:white;
  padding:10px 20px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="preloader" id="preloader">
  <div class="preloader-content">
    <div class="spinner"></div>
    <div class="preloader-text">Loading Air Canvas...</div>
    <div class="preloader-sub">Initializing camera and hand tracking</div>
  </div>
</div>

<div class="title">Air Canvas</div>

<div class="workspace">

<canvas id="canvas" width="700" height="500"></canvas>

<div class="videoBox" id="videoBox">
<canvas id="videoCanvas" width="180" height="135"></canvas>
<video id="video" autoplay playsinline></video>
</div>

</div>

<div class="style-select">
<label for="styleSelect">Style:</label>
<select id="styleSelect" title="Select output style">
<option value="realistic" selected>Realistic</option>
<option value="animated">Animated</option>
<option value="outline">Outline</option>
</select>
</div>

<div class="colors" style="margin-top: 10px;">
  <div style="background:black" onclick="setColor('black')"></div>
  <div style="background:red" onclick="setColor('red')"></div>
  <div style="background:blue" onclick="setColor('blue')"></div>
  <div style="background:green" onclick="setColor('green')"></div>
  <input type="color" id="colorPicker" class="color-picker" value="#000000" onchange="setColor(this.value)">
</div>

<div class="style-select" style="margin-top: 10px;">
  <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
    <input type="checkbox" id="straightenToggle" checked style="width: 18px; height: 18px; cursor: pointer;">
    <span style="font-weight: 600; color: #333;">Line Straightening</span>
  </label>
</div>

<div class="instructions">
🖐 Show open palm to start drawing | ✌️ 2 fingers = Clear canvas | 🤟 3 fingers = Go to Draw Page
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<!-- Google Ink Stroke Modeler for line straightening -->
<script src="https://unpkg.com/@google/modelviewer@1.12.0/lib/model-viewer.js"></script>

<script>
// ============================================
// Line Straightening Module - Straightens AFTER stroke completion
// ============================================

// Store all strokes drawn on the canvas
let allStrokes = []; // Array of {points: [{x,y}], color: string}
let currentStrokePoints = [];
let currentStrokeColor = "black";

class InkStrokeModeler {
  constructor() {
    this.lineThreshold = 0.7; // Threshold for line detection
  }

  /**
   * Analyze if the stroke resembles a line and return straightened points
   */
  straightenStroke(points) {
    if (!points || points.length < 3) {
      return points; // Not enough points to analyze
    }

    // Get first and last points
    const start = points[0];
    const end = points[points.length - 1];

    // Calculate line direction
    const dx = end.x - start.x;
    const dy = end.y - start.y;
    const lineLength = Math.sqrt(dx * dx + dy * dy);

    if (lineLength < 20) {
      return points; // Too short to be a line
    }

    // Normalize direction
    const dirX = dx / lineLength;
    const dirY = dy / lineLength;

    // Calculate how well each point fits the line
    let totalFit = 0;

    for (let i = 1; i < points.length - 1; i++) {
      const p = points[i];

      // Vector from start to point
      const px = p.x - start.x;
      const py = p.y - start.y;

      // Project onto line direction
      const projection = px * dirX + py * dirY;

      // Perpendicular distance
      const perpX = px - projection * dirX;
      const perpY = py - projection * dirY;
      const perpDist = Math.sqrt(perpX * perpX + perpY * perpY);

      // Normalize by stroke length
      const fit = Math.max(0, 1 - (perpDist / lineLength));
      totalFit += fit;
    }

    const avgFit = totalFit / (points.length - 2);

    // If it looks like a line, straighten it
    if (avgFit > this.lineThreshold) {
      const straightenedPoints = [];
      
      // Add start point
      straightenedPoints.push({ x: start.x, y: start.y });

      // Calculate intermediate points
      for (let i = 1; i < points.length - 1; i++) {
        const p = points[i];
        const px = p.x - start.x;
        const py = p.y - start.y;
        
        // Project onto line
        const projection = px * dirX + py * dirY;
        
        straightenedPoints.push({
          x: start.x + projection * dirX,
          y: start.y + projection * dirY
        });
      }

      // Add end point
      straightenedPoints.push({ x: end.x, y: end.y });

      return straightenedPoints;
    }

    return points; // Return original if not detected as line
  }
}

// Create global instance
const inkModeler = new InkStrokeModeler();

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const videoCanvas = document.getElementById("videoCanvas")
const videoCtx = videoCanvas.getContext("2d")

const preloader = document.getElementById("preloader")

let prevX = null
let prevY = null
let drawColor = "black"

// Line straightening enabled by default
let lineStraighteningEnabled = true;

let handState = 0
let palmDetectedTime = 0

function setColor(c){
 drawColor = c
}

function clearCanvas(){
 ctx.clearRect(0, 0, canvas.width, canvas.height)
 allStrokes = [];
 currentStrokePoints = [];
 localStorage.removeItem("sketch");
 localStorage.setItem("status", "idle");
}

// Process and straighten the completed stroke
function processCompletedStroke() {
  if (!lineStraighteningEnabled || currentStrokePoints.length < 3) {
    // Just save the stroke as-is
    if (currentStrokePoints.length > 0) {
      allStrokes.push({
        points: [...currentStrokePoints],
        color: currentStrokeColor
      });
    }
    currentStrokePoints = [];
    return;
  }

  // Analyze and straighten
  const straightenedPoints = inkModeler.straightenStroke(currentStrokePoints);
  
  // Save the straightened stroke
  allStrokes.push({
    points: straightenedPoints,
    color: currentStrokeColor
  });

  // Clear and redraw everything with the straightened stroke
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  allStrokes.forEach(stroke => {
    if (stroke.points.length < 2) return;
    
    ctx.beginPath();
    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
    
    for (let i = 1; i < stroke.points.length; i++) {
      ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
    }
    
    ctx.strokeStyle = stroke.color;
    ctx.lineWidth = 5;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.stroke();
  });

  currentStrokePoints = [];
}

async function generate(){
 const exportCanvas=document.createElement("canvas");
 exportCanvas.width=canvas.width;
 exportCanvas.height=canvas.height;
 const ectx=exportCanvas.getContext("2d");
 ectx.fillStyle="white";
 ectx.fillRect(0,0,exportCanvas.width,exportCanvas.height);
 ectx.drawImage(canvas,0,0);

 const blob=await new Promise(r=>exportCanvas.toBlob(r,"image/png"));
 const reader=new FileReader();

 reader.onloadend=()=>{
   localStorage.setItem("sketch",reader.result);
   localStorage.setItem("style",document.getElementById("styleSelect").value);
   localStorage.setItem("status","idle");
   localStorage.setItem("status","generating");
 };
 reader.readAsDataURL(blob);
}

const hands = new Hands({
 locateFile: function(file) {
 return "https://cdn.jsdelivr.net/npm/@mediapipe/hands/" + file
 }
})

hands.setOptions({
 maxNumHands: 1,
 modelComplexity: 1,
 minDetectionConfidence: 0.5,
 minTrackingConfidence: 0.5
})

let isFirstFrame = true;
let wasDrawing = false;

hands.onResults(function(results) {
 if (isFirstFrame) {
   isFirstFrame = false;
   preloader.classList.add('hidden');
 }

 videoCtx.save();
 videoCtx.clearRect(0, 0, videoCanvas.width, videoCanvas.height);
 videoCtx.drawImage(results.image, 0, 0, videoCanvas.width, videoCanvas.height);
 videoCtx.restore();

 if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
   var landmarks = results.multiHandLandmarks[0]
   
   var idxTip = landmarks[8]
   var midTip = landmarks[12]
   var rngTip = landmarks[16]
   var pkyTip = landmarks[20]
   
   var idxPip = landmarks[6]
   var midPip = landmarks[10]
   var rngPip = landmarks[14]
   var pkyPip = landmarks[18]
   
   var idxMcp = landmarks[5]
   var midMcp = landmarks[9]
   var rngMcp = landmarks[13]
   var pkyMcp = landmarks[17]
   
   var indexExtended = idxTip.y < idxPip.y && idxPip.y < idxMcp.y
   var midExtended = midTip.y < midPip.y && midPip.y < midMcp.y
   var rngExtended = rngTip.y < rngPip.y && rngPip.y < rngMcp.y
   var pkyExtended = pkyTip.y < pkyPip.y && pkyPip.y < pkyMcp.y
   
   var isTwoFingers = indexExtended && midExtended && !rngExtended && !pkyExtended;
   var isThreeFingers = indexExtended && midExtended && rngExtended && !pkyExtended;
   
   if (handState === 0 && isTwoFingers) {
     if (Date.now() - palmDetectedTime > 500) {
       clearCanvas();
       palmDetectedTime = Date.now();
     }
   }
   
   if (isThreeFingers) {
     if (Date.now() - palmDetectedTime > 800) {
       window.location.href = 'draw.html';
       palmDetectedTime = Date.now();
     }
   }
   
   drawHandLandmarks(landmarks)
   
   var isOpenPalm = indexExtended && midExtended && rngExtended && pkyExtended
   
   var x = (1 - idxTip.x) * canvas.width
   var y = idxTip.y * canvas.height
   
   if (isOpenPalm && handState === 0) {
     handState = 1
     palmDetectedTime = Date.now()
   } else if (handState === 1) {
     if (isOpenPalm) {
       if (Date.now() - palmDetectedTime > 500) {
         handState = 2
       }
     } else {
       if (indexExtended && !midExtended && !rngExtended && !pkyExtended) {
         handState = 2
       } else {
         handState = 0
       }
     }
   } else if (handState === 2) {
     if (isOpenPalm) {
       generate();
       handState = 0;
       prevX = null;
       prevY = null;
       palmDetectedTime = Date.now();
     } else if (!indexExtended && !midExtended && !rngExtended && !pkyExtended) {
       handState = 0
       prevX = null
       prevY = null
     }
   }
   
   // Check if drawing state changed
   const isDrawing = (handState === 2 && indexExtended);
   
   // If just stopped drawing, process the completed stroke
   if (wasDrawing && !isDrawing) {
     // Stroke completed - process it!
     processCompletedStroke();
   }
   wasDrawing = isDrawing;
   
   if (isDrawing) {
     if (prevX !== null) {
       // Draw normally while drawing
       ctx.beginPath()
       ctx.moveTo(prevX, prevY)
       ctx.lineTo(x, y)
       ctx.strokeStyle = drawColor
       ctx.lineWidth = 5
       ctx.lineCap = "round"
       ctx.lineJoin = "round"
       ctx.stroke()
       
       // Store point for later processing
       currentStrokePoints.push({x: x, y: y});
       currentStrokeColor = drawColor;
       
       prevX = x
       prevY = y
     } else {
       // First point of stroke
       currentStrokePoints = [{x: x, y: y}];
       currentStrokeColor = drawColor;
       prevX = x
       prevY = y
     }
   } else {
     prevX = null
     prevY = null
   }
 }
})

function drawHandLandmarks(landmarks) {
 var connections = [
   [0,1],[1,2],[2,3],[3,7],[0,5],[5,6],[6,7],[0,9],[9,10],[10,11],
   [0,13],[13,14],[14,15],[0,17],[17,18],[18,19],[5,8],[9,12],[13,16],[17,20],[1,4]
 ]
 
 videoCtx.strokeStyle = "rgba(108, 140, 255, 0.8)"
 videoCtx.lineWidth = 2
 
 connections.forEach(function(conn) {
   var start = conn[0];
   var end = conn[1];
   var p1 = landmarks[start]
   var p2 = landmarks[end]
   videoCtx.beginPath()
   videoCtx.moveTo(p1.x * videoCanvas.width, p1.y * videoCanvas.height)
   videoCtx.lineTo(p2.x * videoCanvas.width, p2.y * videoCanvas.height)
   videoCtx.stroke()
 })
 
 landmarks.forEach(function(lm, i) {
   var x = lm.x * videoCanvas.width
   var y = lm.y * videoCanvas.height
   
   videoCtx.beginPath()
   videoCtx.arc(x, y, 4, 0, Math.PI * 2)
   
   if (i === 8) {
     videoCtx.fillStyle = "#ff0000"
   } else if (i === 4) {
     videoCtx.fillStyle = "#00ff00"
   } else {
     videoCtx.fillStyle = "#6c8cff"
   }
   videoCtx.fill()
 })
 
 var idx = landmarks[8]
 var idxX = idx.x * videoCanvas.width
 var idxY = idx.y * videoCanvas.height
 
 var gradient = videoCtx.createRadialGradient(idxX, idxY, 0, idxX, idxY, 20)
 gradient.addColorStop(0, "rgba(255, 0, 0, 0.5)")
 gradient.addColorStop(1, "rgba(255, 0, 0, 0)")
 videoCtx.beginPath()
 videoCtx.arc(idxX, idxY, 20, 0, Math.PI * 2)
 videoCtx.fillStyle = gradient
 videoCtx.fill()
}

var camera = new Camera(video, {
 onFrame: async function() {
   await hands.send({image: video})
 },
 width: 640,
 height: 480
})

camera.start().then(function(){
 console.log("Camera started")
}).catch(function(err){
 console.error("Camera error:", err)
 preloader.classList.add('hidden');
})

var box = document.getElementById("videoBox")
var isDragging = false
var offsetX, offsetY

box.addEventListener("mousedown", function(e){
 isDragging = true
 offsetX = e.clientX - box.offsetLeft
 offsetY = e.clientY - box.offsetTop
})

document.addEventListener("mousemove", function(e){
 if (isDragging) {
   box.style.left = (e.clientX - offsetX) + "px"
   box.style.top = (e.clientY - offsetY) + "px"
 }
})

document.addEventListener("mouseup", function(){
 isDragging = false
})

// Line straightening toggle
document.getElementById('straightenToggle').addEventListener('change', function(e) {
  lineStraighteningEnabled = e.target.checked;
  // Reset the modeler when toggling
  inkModeler.reset();
  console.log('Line straightening:', lineStraighteningEnabled ? 'enabled' : 'disabled');
});

</script>

</body>
</html>
