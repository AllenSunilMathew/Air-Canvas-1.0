<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air Sketch</title>

<style>
:root{
  --bg:#f4f7ff;
  --accent:#6c8cff;
  --accent2:#8fd3f4;
}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:linear-gradient(135deg,var(--bg),#eef2ff);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.preloader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #f4f7ff, #eef2ff);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s ease, visibility 0.5s ease;
}

.preloader.hidden {
  opacity: 0;
  visibility: hidden;
}

.spinner {
  width: 60px;
  height: 60px;
  border: 4px solid #eef2ff;
  border-top: 4px solid #6c8cff;
  border-right: 4px solid #8fd3f4;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom:20px;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

.title{
  font-size:32px;
  font-weight:800;
  background:linear-gradient(135deg,#6c8cff,#8fd3f4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
}

.workspace{
  position:relative;
  width:700px;
  height:500px;
  background:white;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
  display:flex;
  align-items:center;
  justify-content:center;
}

canvas{
  background:white;
  border-radius:20px;
}

.videoBox{
  position:absolute;
  width:180px;
  height:135px;
  top:20px;
  right:20px;
  border-radius:12px;
  overflow:hidden;
  border:2px solid #ddd;
  cursor:grab;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
  background:#000;
}

#videoCanvas{
  width:100%;
  height:100%;
}

/* Make video visible for debugging - can be hidden later */
#video{
  width:180px;
  height:135px;
  transform:scaleX(-1);
}

.error-message {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #ff4444;
  color: white;
  padding: 20px;
  border-radius: 10px;
  z-index: 10000;
  max-width: 400px;
  text-align: center;
}

.debug-info {
  position: fixed;
  bottom: 10px;
  left: 10px;
  background: rgba(0,0,0,0.7);
  color: #0f0;
  padding: 10px;
  border-radius: 5px;
  font-size: 12px;
  font-family: monospace;
  z-index: 9999;
}

.controls{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

.colors{
  display:flex;
  gap:10px;
  align-items:center;
}

.colors div{
  width:28px;
  height:28px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid #ddd;
}

.color-picker{
  width:40px;
  height:28px;
  border:none;
}

.instructions{
  margin-top:15px;
  font-size:12px;
  color:#666;
  text-align:center;
  background:white;
  padding:10px 20px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="preloader" id="preloader">
<div class="spinner"></div>
<div>Loading Air Canvas...</div>
</div>

<div class="title">Air Canvas</div>

<div class="workspace">
<canvas id="canvas" width="700" height="500"></canvas>

<div class="videoBox" id="videoBox">
<canvas id="videoCanvas" width="180" height="135"></canvas>
<video id="video" autoplay playsinline></video>
</div>
</div>

<div class="colors" style="margin-top:10px;">
<div style="background:black" onclick="setColor('black')"></div>
<div style="background:red" onclick="setColor('red')"></div>
<div style="background:blue" onclick="setColor('blue')"></div>
<div style="background:green" onclick="setColor('green')"></div>
<input type="color" class="color-picker" onchange="setColor(this.value)">
</div>

<label style="margin-top:10px;">
<input type="checkbox" id="straightenToggle" checked>
Line Straightening
</label>

<div class="instructions">
🖐 Open palm = Start | ✌️ Clear | 🤟 Draw Page
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

// ==========================
// SHAPE SIMPLIFICATION ENGINE
// ==========================

let allStrokes=[]
let currentStrokePoints=[]
let currentStrokeColor="black"

class InkStrokeModeler{

constructor(){
// Lower epsilon = more aggressive straightening (1 = very straight, 10 = curved)
this.epsilon=20
// More segments = smoother straight lines
this.segments=50
}

distance(a,b){
return Math.sqrt(
(a.x-b.x)*(a.x-b.x)+
(a.y-b.y)*(a.y-b.y))
}

perpendicularDistance(p,start,end){

const dx=end.x-start.x
const dy=end.y-start.y

if(dx===0 && dy===0) return this.distance(p,start)

const t=((p.x-start.x)*dx+(p.y-start.y)*dy)/(dx*dx+dy*dy)

const projX=start.x+t*dx
const projY=start.y+t*dy

return this.distance(p,{x:projX,y:projY})
}

simplify(points){

if(points.length<3) return points

let maxDist=0
let index=0
const end=points.length-1

for(let i=1;i<end;i++){

const d=this.perpendicularDistance(points[i],points[0],points[end])

if(d>maxDist){
index=i
maxDist=d
}

}

if(maxDist>this.epsilon){

const rec1=this.simplify(points.slice(0,index+1))
const rec2=this.simplify(points.slice(index))

return rec1.slice(0,-1).concat(rec2)

}

return [points[0],points[end]]
}

straightenStroke(points){

const simplified=this.simplify(points)

const newPoints=[]

for(let i=0;i<simplified.length-1;i++){

const start=simplified[i]
const end=simplified[i+1]

newPoints.push(start)

const segments=this.segments

for(let j=1;j<segments;j++){

const t=j/segments

newPoints.push({
x:start.x+(end.x-start.x)*t,
y:start.y+(end.y-start.y)*t
})

}

}

newPoints.push(simplified[simplified.length-1])

return newPoints
}

}

const inkModeler=new InkStrokeModeler()

// ==========================
// CANVAS SETUP
// ==========================

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const videoCanvas=document.getElementById("videoCanvas")
const videoCtx=videoCanvas.getContext("2d")

const preloader=document.getElementById("preloader")

let prevX=null
let prevY=null
let drawColor="black"

let lineStraighteningEnabled=true

function setColor(c){
drawColor=c
}

function clearCanvas(){
ctx.clearRect(0,0,canvas.width,canvas.height)
allStrokes=[]
currentStrokePoints=[]
}

// ==========================
// STROKE PROCESSING
// ==========================

function processCompletedStroke(){

if(!lineStraighteningEnabled || currentStrokePoints.length<3){

if(currentStrokePoints.length>0){

allStrokes.push({
points:[...currentStrokePoints],
color:currentStrokeColor
})

}

currentStrokePoints=[]
return

}

const clean=inkModeler.straightenStroke(currentStrokePoints)

allStrokes.push({
points:clean,
color:currentStrokeColor
})

redraw()

currentStrokePoints=[]
}

function redraw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

allStrokes.forEach(stroke=>{

if(stroke.points.length<2) return

ctx.beginPath()

ctx.moveTo(stroke.points[0].x,stroke.points[0].y)

for(let i=1;i<stroke.points.length;i++){
ctx.lineTo(stroke.points[i].x,stroke.points[i].y)
}

ctx.strokeStyle=stroke.color
ctx.lineWidth=5
ctx.lineCap="round"
ctx.lineJoin="round"
ctx.stroke()

})

}

// ==========================
// HAND TRACKING WITH GESTURE DETECTION
// ==========================

const hands=new Hands({
locateFile:file=>"https://cdn.jsdelivr.net/npm/@mediapipe/hands/"+file
})

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.5,
minTrackingConfidence:0.5
})

let wasDrawing=false
let isDrawingMode=false // Drawing mode - starts with open palm gesture
let gestureHoldTime=0 // Time to hold gesture for confirmation
const GESTURE_HOLD_FRAMES=15 // Frames to hold gesture before action

// Function to check if a finger is extended
// Returns true if the fingertip is extended beyond the pip joint
function isFingerExtended(lm, tipIdx, pipIdx, wristIdx) {
  const tip = lm[tipIdx];
  const pip = lm[pipIdx];
  const wrist = lm[wristIdx];
  
  if (!tip || !pip || !wrist) return false;
  
  // Get the direction from wrist to pip
  const wristToPipX = pip.x - wrist.x;
  const wristToPipY = pip.y - wrist.y;
  const wristToPipLen = Math.sqrt(wristToPipX * wristToPipX + wristToPipY * wristToPipY);
  
  // Get the direction from wrist to tip
  const wristToTipX = tip.x - wrist.x;
  const wristToTipY = tip.y - wrist.y;
  const wristToTipLen = Math.sqrt(wristToTipX * wristToTipX + wristToTipY * wristToTipY);
  
  // Finger is extended if tip is further from wrist than pip
  return wristToTipLen > wristToPipLen * 1.1;
}

// Function to detect hand gesture
function detectGesture(lm) {
  // MediaPipe landmark indices:
  // 4: Thumb tip, 3: Thumb pip
  // 8: Index tip, 6: Index pip  
  // 12: Middle tip, 10: Middle pip
  // 16: Ring tip, 14: Ring pip
  // 20: Pinky tip, 18: Pinky pip
  // 0: Wrist
  
  const thumbExtended = isFingerExtended(lm, 4, 3, 0);
  const indexExtended = isFingerExtended(lm, 8, 6, 0);
  const middleExtended = isFingerExtended(lm, 12, 10, 0);
  const ringExtended = isFingerExtended(lm, 16, 14, 0);
  const pinkyExtended = isFingerExtended(lm, 20, 18, 0);
  
  const extendedCount = [thumbExtended, indexExtended, middleExtended, ringExtended, pinkyExtended].filter(Boolean).length;
  
  // Open palm: 4 or more fingers extended
  if (extendedCount >= 4) {
    return 'open_palm';
  }
  
  // Three fingers: index, middle, ring extended (for going back to draw.html)
  if (indexExtended && middleExtended && ringExtended && !pinkyExtended) {
    return 'three_fingers';
  }
  
  // Two fingers (peace sign): index and middle extended
  if (indexExtended && middleExtended && !ringExtended && !pinkyExtended) {
    return 'two_fingers';
  }
  
  // Index finger only: index extended, others folded
  if (indexExtended && !middleExtended && !ringExtended && !pinkyExtended) {
    return 'index_finger';
  }
  
  return 'other';
}

// Add status indicator for drawing mode
const statusDiv = document.createElement('div');
statusDiv.id = 'statusIndicator';
statusDiv.style.cssText = 'position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.7);color:#fff;padding:8px 12px;border-radius:5px;font-size:14px;z-index:9999;';
statusDiv.textContent = '✋ Show Open Palm to Start';
document.body.appendChild(statusDiv);

function updateStatus(text, color) {
  statusDiv.textContent = text;
  statusDiv.style.background = color || 'rgba(0,0,0,0.7)';
}

hands.onResults(function(results){

if(preloader) preloader.classList.add("hidden")

videoCtx.clearRect(0,0,180,135)
videoCtx.drawImage(results.image,0,0,180,135)

// Check if hand landmarks exist and have the required points
if(results.multiHandLandmarks && 
   results.multiHandLandmarks.length > 0 && 
   results.multiHandLandmarks[0] &&
   results.multiHandLandmarks[0].length >= 21){

const lm=results.multiHandLandmarks[0]
const gesture = detectGesture(lm);

// Handle gesture detection with hold time
if (gesture === 'open_palm') {
  gestureHoldTime++;
  if (gestureHoldTime >= GESTURE_HOLD_FRAMES && !isDrawingMode) {
    isDrawingMode = true;
    updateStatus('✏️ Drawing Mode - Use Index Finger', '#4CAF50');
    gestureHoldTime = 0;
  }
} else if (gesture === 'two_fingers') {
  // Two fingers = clear canvas
  gestureHoldTime++;
  if (gestureHoldTime >= GESTURE_HOLD_FRAMES) {
    clearCanvas();
    updateStatus('🗑️ Canvas Cleared', '#ff9800');
    gestureHoldTime = 0;
  }
} else if (gesture === 'three_fingers') {
  // Three fingers = go back to draw.html
  gestureHoldTime++;
  if (gestureHoldTime >= GESTURE_HOLD_FRAMES) {
    window.location.href = 'draw.html';
    gestureHoldTime = 0;
  }
} else {
  gestureHoldTime = 0;
}

// Only draw if in drawing mode AND index finger is detected
if (isDrawingMode && gesture === 'index_finger') {

const idx=lm[8]
const pip=lm[6]

if(idx && pip) {

const x=(1-idx.x)*canvas.width
const y=idx.y*canvas.height

if(prevX!==null){

ctx.beginPath()
ctx.moveTo(prevX,prevY)
ctx.lineTo(x,y)

ctx.strokeStyle=drawColor
ctx.lineWidth=5
ctx.stroke()

currentStrokePoints.push({x,y})
currentStrokeColor=drawColor

}else{

currentStrokePoints=[{x,y}]
currentStrokeColor=drawColor

}

prevX=x
prevY=y
wasDrawing=true

}

} else {
  // Index finger not extended - stop drawing
  if (wasDrawing) {
    processCompletedStroke();
    wasDrawing = false;
  }
  prevX = null;
  prevY = null;
}

} else {
  // No hand detected
  if (wasDrawing) {
    processCompletedStroke();
    wasDrawing = false;
  }
  isDrawingMode = false;
  prevX = null;
  prevY = null;
  gestureHoldTime = 0;
  updateStatus('✋ Show Open Palm to Start', '#607d8b');
}

})

// ==========================
// CAMERA - Robust initialization with error handling
// ==========================

let camera = null;
let isCameraStarted = false;

// Debug function to update status
function updateDebugInfo(msg) {
  console.log('[Camera]', msg);
  const debugEl = document.getElementById('debugInfo');
  if (debugEl) {
    debugEl.textContent = msg;
  }
}

// Error display function
function showError(message) {
  // Remove existing error
  const existing = document.querySelector('.error-message');
  if (existing) existing.remove();
  
  const errorDiv = document.createElement('div');
  errorDiv.className = 'error-message';
  errorDiv.innerHTML = `
    <h3>⚠️ Error</h3>
    <p>${message}</p>
    <button onclick="location.reload()" style="margin-top:10px;padding:8px 16px;cursor:pointer;">
      Retry
    </button>
  `;
  document.body.appendChild(errorDiv);
}

// Check if MediaPipe is loaded
function checkMediaPipeLoaded() {
  updateDebugInfo('Checking MediaPipe...');
  
  if (typeof Hands === 'undefined') {
    showError('MediaPipe Hands not loaded. Check internet connection.');
    return false;
  }
  if (typeof Camera === 'undefined') {
    updateDebugInfo('Camera class not found, using fallback...');
    return false;
  }
  return true;
}

// Initialize camera with fallback
async function initCamera() {
  updateDebugInfo('Initializing camera...');
  
  try {
    // First check MediaPipe
    if (!checkMediaPipeLoaded()) {
      updateDebugInfo('Using fallback camera method...');
      await initCameraFallback();
      return;
    }
    
    // Try MediaPipe Camera class
    camera = new Camera(video, {
      onFrame: async () => {
        if (video.readyState === 4) {
          await hands.send({ image: video });
        }
      },
      width: 640,
      height: 480
    });
    
    await camera.start();
    isCameraStarted = true;
    updateDebugInfo('Camera started (MediaPipe)');
    
  } catch (error) {
    console.error('Camera init error:', error);
    updateDebugInfo('MediaPipe Camera failed, trying fallback...');
    await initCameraFallback();
  }
}

// Fallback camera initialization using getUserMedia directly
async function initCameraFallback() {
  updateDebugInfo('Requesting camera permission...');
  
  try {
    // Request camera access directly
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        width: { ideal: 640 },
        height: { ideal: 480 },
        facingMode: 'user'
      }
    });
    
    video.srcObject = stream;
    
    await new Promise((resolve) => {
      video.onloadedmetadata = () => {
        video.play();
        resolve();
      };
    });
    
    isCameraStarted = true;
    updateDebugInfo('Camera started (Fallback)');
    
    // Start processing loop
    processVideoFrame();
    
  } catch (error) {
    console.error('Camera fallback error:', error);
    showError(`Camera access denied: ${error.message}. Please allow camera access and try again.`);
  }
}

// Process video frames (fallback method)
async function processVideoFrame() {
  if (!isCameraStarted || video.paused || video.ended) {
    requestAnimationFrame(processVideoFrame);
    return;
  }
  
  try {
    if (video.readyState === 4) {
      await hands.send({ image: video });
    }
  } catch (e) {
    console.error('Frame processing error:', e);
  }
  
  requestAnimationFrame(processVideoFrame);
}

// Initialize on page load
window.addEventListener('load', async () => {
  updateDebugInfo('Page loaded, starting camera...');
  
  // Small delay to ensure MediaPipe scripts are loaded
  await new Promise(resolve => setTimeout(resolve, 500));
  
  await initCamera();
});

// Add debug info element
const debugDiv = document.createElement('div');
debugDiv.id = 'debugInfo';
debugDiv.className = 'debug-info';
debugDiv.textContent = 'Initializing...';
document.body.appendChild(debugDiv);

// ==========================
// TOGGLE
// ==========================

document.getElementById("straightenToggle").addEventListener("change",e=>{
lineStraighteningEnabled=e.target.checked
})

</script>

</body>
</html>
