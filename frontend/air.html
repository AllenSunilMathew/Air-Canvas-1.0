<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air Sketch</title>

<style>
:root{
  --bg:#f4f7ff;
  --accent:#6c8cff;
  --accent2:#8fd3f4;
}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:linear-gradient(135deg,var(--bg),#eef2ff);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.title{
  font-size:32px;
  font-weight:800;
  background:linear-gradient(135deg,#6c8cff,#8fd3f4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:20px;
}

.workspace{
  position:relative;
  width:700px;
  height:500px;
  background:white;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
  display:flex;
  align-items:center;
  justify-content:center;
}

canvas{
  background:white;
  border-radius:20px;
}

.videoBox{
  position:absolute;
  width:180px;
  height:135px;
  top:20px;
  right:20px;
  border-radius:12px;
  overflow:hidden;
  border:2px solid #ddd;
  cursor:grab;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
  background:#000;
}

#videoCanvas{
  width:100%;
  height:100%;
  object-fit:cover;
}

video{
  display:none;
}

.controls{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

.buttons{
  display:flex;
  gap:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(108,140,255,.3);
}

button:hover{
  transform:scale(1.05);
}

.colors{
  display:flex;
  gap:10px;
  align-items:center;
}

.colors div{
  width:28px;
  height:28px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid #ddd;
}

.color-picker{
  width:40px;
  height:28px;
  border:none;
}

.style-select{
  display:flex;
  gap:10px;
  align-items:center;
}

.style-select select{
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#eef2ff;
  font-weight:600;
  cursor:pointer;
  font-size:14px;
}
</style>
</head>

<body>

<div class="title">Air Canvas</div>

<div class="workspace">

<canvas id="canvas" width="700" height="500"></canvas>

<div class="videoBox" id="videoBox">
<canvas id="videoCanvas" width="180" height="135"></canvas>
<video id="video" autoplay playsinline></video>
</div>

</div>

<div class="controls">

<div class="colors">
<div style="background:black" onclick="setColor('black')"></div>
<div style="background:red" onclick="setColor('red')"></div>
<div style="background:blue" onclick="setColor('blue')"></div>
<div style="background:green" onclick="setColor('green')"></div>
<div style="background:orange" onclick="setColor('orange')"></div>
<input type="color" class="color-picker" onchange="setColor(this.value)">
</div>

<div class="buttons">
<button onclick="clearCanvas()">Clear</button>
<button onclick="generate()">Generate Image</button>
</div>

<div class="style-select">
<select id="styleSelect">
<option value="outline">Outline</option>
<option value="realistic" selected>Realistic</option>
<option value="animated">Animated</option>
</select>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const videoCanvas = document.getElementById("videoCanvas")
const videoCtx = videoCanvas.getContext("2d")

let prevX = null
let prevY = null
let drawColor = "black"

// State: 0 = waiting for open palm, 1 = palm detected, 2 = drawing
let handState = 0
let palmDetectedTime = 0

function setColor(c){
 drawColor = c
}

function distance(a, b){
 return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2)
}

function clearCanvas(){
 ctx.clearRect(0, 0, canvas.width, canvas.height)
 localStorage.removeItem("sketch");
 localStorage.setItem("status", "idle");
}

async function generate(){
 const exportCanvas=document.createElement("canvas");
 exportCanvas.width=canvas.width;
 exportCanvas.height=canvas.height;
 const ectx=exportCanvas.getContext("2d");
 ectx.fillStyle="white";
 ectx.fillRect(0,0,exportCanvas.width,exportCanvas.height);
 ectx.drawImage(canvas,0,0);

 const blob=await new Promise(r=>exportCanvas.toBlob(r,"image/png"));
 const reader=new FileReader();

 reader.onloadend=()=>{
   localStorage.setItem("sketch",reader.result);
   localStorage.setItem("style",styleSelect.value);
   localStorage.setItem("status","idle"); // Reset first
   localStorage.setItem("status","generating"); // Then generate to always trigger
 };
 reader.readAsDataURL(blob);
}

// Initialize MediaPipe Hands
const hands = new Hands({
 locateFile: (file) => {
 return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
 }
})

hands.setOptions({
 maxNumHands: 1,
 modelComplexity: 1,
 minDetectionConfidence: 0.5,
 minTrackingConfidence: 0.5
})

hands.onResults((results) => {
 // Draw video frame on video canvas
 videoCtx.save();
 videoCtx.clearRect(0, 0, videoCanvas.width, videoCanvas.height);
 videoCtx.drawImage(results.image, 0, 0, videoCanvas.width, videoCanvas.height);
 videoCtx.restore();

 if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
   const landmarks = results.multiHandLandmarks[0]
   
   // Get key landmarks
   const idxTip = landmarks[8]
   const thTip = landmarks[4]
   const midTip = landmarks[12]
   const rngTip = landmarks[16]
   const pkyTip = landmarks[20]
   
   // Draw hand landmarks on video canvas
   drawHandLandmarks(landmarks)
   
   // Convert to drawing canvas coordinates (flip X for mirror effect)
   let x = (1 - idxTip.x) * canvas.width
   let y = idxTip.y * canvas.height
   
   // Check if index finger is extended (straight up)
   const indexPip = landmarks[6]  // pip joint
   const indexMcp = landmarks[5]  // mcp joint
   const indexExtended = idxTip.y < indexPip.y && indexPip.y < indexMcp.y
   
   // Check if all fingers (except thumb) are extended - open palm
   const midExtended = midTip.y < landmarks[11].y && landmarks[11].y < landmarks[10].y
   const rngExtended = rngTip.y < landmarks[15].y && landmarks[15].y < landmarks[14].y
   const pkyExtended = pkyTip.y < landmarks[19].y && landmarks[19].y < landmarks[18].y
   const isOpenPalm = midExtended && rngExtended && pkyExtended && indexExtended
   
   // State machine:
   // State 0: Waiting for open palm (idle)
   // State 1: Drawing mode active (index finger will draw)
   // State 2: Generating (open palm triggers generation)
   
   if (isOpenPalm && handState === 0) {
     // Transition to drawing mode
     handState = 1
     palmDetectedTime = Date.now()
   } else if (handState === 1 && isOpenPalm) {
     // Open palm while in drawing mode = trigger generate
     if (Date.now() - palmDetectedTime > 800) {
       // Trigger generate after holding open palm for 800ms
       handState = 2
       generate()
     }
   } else if (handState === 1) {
     // Drawing mode - index finger extended = draw
     if (indexExtended) {
       // Drawing with index finger
     } else {
       // Index finger not extended, don't draw
     }
   } else if (handState === 2) {
     // Generating - do nothing
     return
   }
   
   // Drawing logic - only draw when in state 1 and index is extended
   if (handState === 1 && indexExtended) {
     if (prevX !== null) {
       ctx.beginPath()
       ctx.moveTo(prevX, prevY)
       ctx.lineTo(x, y)
       ctx.strokeStyle = drawColor
       ctx.lineWidth = 5
       ctx.lineCap = 'round'
       ctx.lineJoin = 'round'
       ctx.stroke()
     }
     prevX = x
     prevY = y
   } else {
     prevX = null
     prevY = null
   }
 }
})

function drawHandLandmarks(landmarks) {
 // Draw connections (skeleton)
 const connections = [
   [0,1],[1,2],[2,3],[3,7],[0,5],[5,6],[6,7],[0,9],[9,10],[10,11],
   [0,13],[13,14],[14,15],[0,17],[17,18],[18,19],[5,8],[9,12],[13,16],[17,20],[1,4]
 ]
 
 videoCtx.strokeStyle = 'rgba(108, 140, 255, 0.8)'
 videoCtx.lineWidth = 2
 
 connections.forEach(([start, end]) => {
   const p1 = landmarks[start]
   const p2 = landmarks[end]
   videoCtx.beginPath()
   videoCtx.moveTo(p1.x * videoCanvas.width, p1.y * videoCanvas.height)
   videoCtx.lineTo(p2.x * videoCanvas.width, p2.y * videoCanvas.height)
   videoCtx.stroke()
 })
 
 // Draw landmark points
 landmarks.forEach((lm, i) => {
   const x = lm.x * videoCanvas.width
   const y = lm.y * videoCanvas.height
   
   videoCtx.beginPath()
   videoCtx.arc(x, y, 4, 0, Math.PI * 2)
   
   // Index finger tip is red, others are blue
   if (i === 8) {
     videoCtx.fillStyle = '#ff0000'
   } else if (i === 4) {
     videoCtx.fillStyle = '#00ff00'  // Thumb
   } else {
     videoCtx.fillStyle = '#6c8cff'
   }
   videoCtx.fill()
 })
 
 // Draw index finger tip highlight (drawing point)
 const idx = landmarks[8]
 const idxX = idx.x * videoCanvas.width
 const idxY = idx.y * videoCanvas.height
 
 // Glow effect
 const gradient = videoCtx.createRadialGradient(idxX, idxY, 0, idxX, idxY, 20)
 gradient.addColorStop(0, 'rgba(255, 0, 0, 0.5)')
 gradient.addColorStop(1, 'rgba(255, 0, 0, 0)')
 videoCtx.beginPath()
 videoCtx.arc(idxX, idxY, 20, 0, Math.PI * 2)
 videoCtx.fillStyle = gradient
 videoCtx.fill()
}

// Initialize camera
const camera = new Camera(video, {
 onFrame: async () => {
   await hands.send({image: video})
 },
 width: 640,
 height: 480
})

camera.start().then(() => {
 console.log("Camera started")
}).catch(err => {
 console.error("Camera error:", err)
})

// Video box drag functionality
const box = document.getElementById("videoBox")
let isDragging = false
let offsetX, offsetY

box.addEventListener("mousedown", (e) => {
 isDragging = true
 offsetX = e.clientX - box.offsetLeft
 offsetY = e.clientY - box.offsetTop
})

document.addEventListener("mousemove", (e) => {
 if (isDragging) {
   box.style.left = (e.clientX - offsetX) + "px"
   box.style.top = (e.clientY - offsetY) + "px"
 }
})

document.addEventListener("mouseup", () => {
 isDragging = false
})

</script>

</body>
</html>
